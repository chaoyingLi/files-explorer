# ──────────────────────────────────────────────────────────────
# Files Explorer — 自动发布流水线
# 触发条件：推送 v 开头 tag（如 v0.3.0）
# 构建产物自动上传至 Gitee Releases + GitHub Releases
# ──────────────────────────────────────────────────────────────

name: 发布 / Publish

on:
  push:
    tags:
      - "v*"

# 安全：将以下 Secrets 添加到 GitHub 仓库 Settings → Secrets and variables → Actions
# 必须配置：
#   TAURI_PRIVATE_KEY    — Tauri 签名私钥内容（cat ~/.tauri/updater.key）
#   TAURI_KEY_PASSWORD   — 私钥密码（如果有）
#   GITEE_TOKEN          — Gitee 个人访问令牌（需 repo 权限）
# 可选配置：
#   APPLE_ID             — macOS 公证 Apple ID
#   APPLE_PASSWORD       — macOS 公证 App 专用密码
#   APPLE_TEAM_ID        — Apple Team ID

env:
  GITEE_REPO: hhyd/files-explorer
  APP_NAME: Files Explorer

jobs:
  # ── 步骤 1：提取版本号 ──
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      tag: ${{ github.ref_name }}
    steps:
      - name: 提取版本号
        id: extract
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

  # ── 步骤 2：创建 Gitee Release ──
  # 先创建 Release 占位，后续 job 再上传文件
  create-gitee-release:
    needs: get-version
    runs-on: ubuntu-latest
    steps:
      - name: 创建 Gitee Release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG: ${{ needs.get-version.outputs.tag }}
          VERSION: ${{ needs.get-version.outputs.version }}
        run: |
          API="https://gitee.com/api/v5/repos/${{ env.GITEE_REPO }}/releases"
          BODY="Files Explorer v${VERSION} 发布。"
          curl -X POST "$API" \
            -H "Content-Type: application/json" \
            -H "Authorization: bearer $GITEE_TOKEN" \
            -d "$(jq -n \
              --arg tag "$TAG" \
              --arg name "$TAG" \
              --arg body "$BODY" \
              '{tag_name: $tag, name: $name, body: $body, prerelease: false}')"

  # ── 步骤 3：各平台并行构建 ──

  build-macos-x86_64:
    needs: [get-version, create-gitee-release]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-apple-darwin

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装前端依赖
        run: npm ci

      - name: 构建（macOS Intel）
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # macOS 代码签名（如有证书）
          if [ -n "$APPLE_CERTIFICATE" ] && [ -n "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/cert.p12
            security create-keychain -p temp temp.keychain
            security default-keychain -s temp.keychain
            security unlock-keychain -p temp temp.keychain
            security import /tmp/cert.p12 -k temp.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k temp temp.keychain
          fi
          npx @tauri-apps/cli build --target x86_64-apple-darwin

      - name: 收集产物
        run: |
          mkdir -p dist
          cp -R "src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/"*.dmg dist/ 2>/dev/null || true
          find src-tauri/target/x86_64-apple-darwin/release -name "*.sig" -exec cp {} dist/ \;

      - name: 上传到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: false

      - name: 上传到 Gitee Releases
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG: ${{ needs.get-version.outputs.tag }}
        run: |
          RELEASE_ID=$(curl -s \
            -H "Authorization: bearer $GITEE_TOKEN" \
            "https://gitee.com/api/v5/repos/${{ env.GITEE_REPO }}/releases/tags/$TAG" \
            | jq -r '.id')
          for f in dist/*; do
            [ -f "$f" ] && curl -X POST \
              -H "Authorization: bearer $GITEE_TOKEN" \
              -F "file=@$f" \
              "https://gitee.com/api/v5/repos/${{ env.GITEE_REPO }}/releases/$RELEASE_ID/release_files"
          done

      - name: 保存签名文件（传递到最终步骤）
        uses: actions/upload-artifact@v4
        with:
          name: sig-macos-x64
          path: dist/*.sig
          if-no-files-found: ignore

  build-macos-aarch64:
    needs: [get-version, create-gitee-release]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: aarch64-apple-darwin

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装前端依赖
        run: npm ci

      - name: 构建（macOS Apple Silicon）
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ] && [ -n "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/cert.p12
            security create-keychain -p temp temp.keychain
            security default-keychain -s temp.keychain
            security unlock-keychain -p temp temp.keychain
            security import /tmp/cert.p12 -k temp.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k temp temp.keychain
          fi
          npx @tauri-apps/cli build --target aarch64-apple-darwin

      - name: 收集产物
        run: |
          mkdir -p dist
          cp -R "src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/"*.dmg dist/ 2>/dev/null || true
          find src-tauri/target/aarch64-apple-darwin/release -name "*.sig" -exec cp {} dist/ \;

      - name: 上传到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: false

      - name: 上传到 Gitee Releases
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG: ${{ needs.get-version.outputs.tag }}
        run: |
          RELEASE_ID=$(curl -s \
            -H "Authorization: bearer $GITEE_TOKEN" \
            "https://gitee.com/api/v5/repos/${{ env.GITEE_REPO }}/releases/tags/$TAG" \
            | jq -r '.id')
          for f in dist/*; do
            [ -f "$f" ] && curl -X POST \
              -H "Authorization: bearer $GITEE_TOKEN" \
              -F "file=@$f" \
              "https://gitee.com/api/v5/repos/${{ env.GITEE_REPO }}/releases/$RELEASE_ID/release_files"
          done

      - name: 保存签名文件
        uses: actions/upload-artifact@v4
        with:
          name: sig-macos-arm64
          path: dist/*.sig
          if-no-files-found: ignore

  build-windows:
    needs: [get-version, create-gitee-release]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装前端依赖
        run: npm ci

      - name: 构建（Windows）
        shell: pwsh
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: npx @tauri-apps/cli build

      - name: 收集产物
        shell: pwsh
        run: |
          mkdir dist -Force
          Copy-Item "src-tauri/target/release/bundle/msi/*.msi" dist/ -ErrorAction SilentlyContinue
          Get-ChildItem src-tauri/target/release/*.sig -ErrorAction SilentlyContinue | Copy-Item -Destination dist/

      - name: 上传到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: false

      - name: 上传到 Gitee Releases
        shell: pwsh
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG: ${{ needs.get-version.outputs.tag }}
        run: |
          $releaseId = (curl -s `
            -H "Authorization: bearer $env:GITEE_TOKEN" `
            "https://gitee.com/api/v5/repos/${{ env.GITEE_REPO }}/releases/tags/$env:TAG" `
            | ConvertFrom-Json).id
          Get-ChildItem dist/* | ForEach-Object {
            curl -X POST `
              -H "Authorization: bearer $env:GITEE_TOKEN" `
              -F "file=@$($_.FullName)" `
              "https://gitee.com/api/v5/repos/${{ env.GITEE_REPO }}/releases/$releaseId/release_files"
          }

      - name: 保存签名文件
        uses: actions/upload-artifact@v4
        with:
          name: sig-windows
          path: dist/*.sig
          if-no-files-found: ignore

  build-linux:
    needs: [get-version, create-gitee-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: 安装前端依赖
        run: npm ci

      - name: 构建（Linux）
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: npx @tauri-apps/cli build

      - name: 收集产物
        run: |
          mkdir -p dist
          cp src-tauri/target/release/bundle/appimage/*.AppImage dist/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/deb/*.deb dist/ 2>/dev/null || true
          find src-tauri/target/release -name "*.sig" -exec cp {} dist/ \;

      - name: 上传到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: false

      - name: 上传到 Gitee Releases
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG: ${{ needs.get-version.outputs.tag }}
        run: |
          RELEASE_ID=$(curl -s \
            -H "Authorization: bearer $GITEE_TOKEN" \
            "https://gitee.com/api/v5/repos/${{ env.GITEE_REPO }}/releases/tags/$TAG" \
            | jq -r '.id')
          for f in dist/*; do
            [ -f "$f" ] && curl -X POST \
              -H "Authorization: bearer $GITEE_TOKEN" \
              -F "file=@$f" \
              "https://gitee.com/api/v5/repos/${{ env.GITEE_REPO }}/releases/$RELEASE_ID/release_files"
          done

      - name: 保存签名文件
        uses: actions/upload-artifact@v4
        with:
          name: sig-linux
          path: dist/*.sig
          if-no-files-found: ignore

  # ── 步骤 4：更新 updater.json 并推送 ──
  update-updater-json:
    needs:
      - get-version
      - build-macos-x86_64
      - build-macos-aarch64
      - build-windows
      - build-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 下载所有签名文件
        uses: actions/download-artifact@v4
        with:
          pattern: sig-*
          path: sig-files
          merge-multiple: true

      - name: 读取签名并生成 updater.json
        env:
          TAG: ${{ needs.get-version.outputs.tag }}
          VERSION: ${{ needs.get-version.outputs.version }}
        run: |
          # 读取各平台签名（不存在则留空）
          SIG_X64=$(cat sig-files/*x86_64*.sig sig-files/*x64*.sig 2>/dev/null | head -1 || echo "")
          SIG_ARM64=$(cat sig-files/*aarch64*.sig sig-files/*arm64*.sig 2>/dev/null | head -1 || echo "")
          SIG_WIN=$(cat sig-files/*windows*.sig sig-files/*Win*.sig 2>/dev/null | head -1 || echo "")
          SIG_LINUX=$(cat sig-files/*linux*.sig 2>/dev/null | head -1 || echo "")

          PUB_DATE=$(date -u +'%Y-%m-%dT%H:%M:%S+08:00')
          BASE_URL="https://gitee.com/${{ env.GITEE_REPO }}/releases/download/$TAG"

          cat > updater.json << JSONEOF
          {
            "version": "$VERSION",
            "notes": "请访问 Gitee Releases 查看更新详情",
            "pub_date": "$PUB_DATE",
            "platforms": {
              "darwin-x86_64": {
                "signature": "${SIG_X64:-}",
                "url": "${BASE_URL}/Files Explorer_x64.dmg"
              },
              "darwin-aarch64": {
                "signature": "${SIG_ARM64:-}",
                "url": "${BASE_URL}/Files Explorer_aarch64.dmg"
              },
              "windows-x86_64": {
                "signature": "${SIG_WIN:-}",
                "url": "${BASE_URL}/Files Explorer_${VERSION}_x64_en-US.msi"
              },
              "linux-x86_64": {
                "signature": "${SIG_LINUX:-}",
                "url": "${BASE_URL}/Files Explorer_${VERSION}_amd64.AppImage"
              }
            }
          }
          JSONEOF
          echo "=== 生成的 updater.json ==="
          cat updater.json

      - name: 提交并推送到 Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          git config user.name "发布机器人"
          git config user.email "bot@files-explorer.dev"
          git add updater.json
          git commit -m "chore: 更新 updater.json 至 ${{ needs.get-version.outputs.version }}"
          git push https://oauth2:$GITEE_TOKEN@gitee.com/${{ env.GITEE_REPO }}.git HEAD:master

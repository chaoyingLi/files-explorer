# ──────────────────────────────────────────────────────────────
# Files Explorer — 自动发布流水线
# 触发条件：推送 v 开头 tag（如 v0.3.0）
# 构建产物自动上传至 Gitee Releases + GitHub Releases
# ──────────────────────────────────────────────────────────────

name: 发布 / Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 0.3.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  GITEE_REPO: hhyd/files-explorer
  APP_NAME: Files Explorer

jobs:
  # ── 步骤 1：提取版本号 ──
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      tag: ${{ steps.extract.outputs.tag }}
    steps:
      - name: 提取版本号
        id: extract
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          fi

  # ── 步骤 2：创建 Gitee Release ──
  create-gitee-release:
    needs: get-version
    runs-on: ubuntu-latest
    steps:
      - name: 创建或获取 Gitee Release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG: ${{ needs.get-version.outputs.tag }}
          VERSION: ${{ needs.get-version.outputs.version }}
        run: |
          API="https://gitee.com/api/v5/repos/${{ env.GITEE_REPO }}/releases"
          EXISTING=$(curl -s -H "Authorization: bearer $GITEE_TOKEN" "$API/tags/$TAG")
          RELEASE_ID=$(echo "$EXISTING" | jq -r '.id // empty')
          if [ -n "$RELEASE_ID" ] && [ "$RELEASE_ID" != "null" ]; then
            echo "✅ Gitee Release 已存在: id=$RELEASE_ID"
          else
            echo "📦 创建新的 Gitee Release..."
            BODY="Files Explorer v${VERSION} 发布。"
            RESULT=$(curl -s -X POST "$API" \
              -H "Content-Type: application/json" \
              -H "Authorization: bearer $GITEE_TOKEN" \
              -d "$(jq -n \
                --arg tag "$TAG" \
                --arg name "$TAG" \
                --arg body "$BODY" \
                '{tag_name: $tag, name: $name, body: $body, target_commitish: "master", prerelease: false}')")
            RELEASE_ID=$(echo "$RESULT" | jq -r '.id // empty')
            if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
              echo "❌ 创建 Gitee Release 失败: $RESULT"
            else
              echo "✅ Gitee Release 创建成功: id=$RELEASE_ID"
            fi
          fi

  # ── 步骤 3：各平台并行构建 ──

  build-macos-x86_64:
    needs: [get-version, create-gitee-release]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 同步版本号至 tauri.conf.json
        run: |
          jq --arg v "${{ needs.get-version.outputs.version }}" \
            '.version = $v' src-tauri/tauri.conf.json > tmp.json \
            && mv tmp.json src-tauri/tauri.conf.json

      - name: 安装 Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-apple-darwin
          rustflags: ""

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装前端依赖
        run: npm ci

      - name: 安装 Tauri CLI
        run: npm install -D @tauri-apps/cli

      - name: 构建（macOS Intel）
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: npx @tauri-apps/cli build --target x86_64-apple-darwin

      - name: 收集产物
        run: |
          mkdir -p dist
          cp -R "src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/"*.dmg dist/ 2>/dev/null || true
          find src-tauri/target/x86_64-apple-darwin/release -name "*.sig" -exec cp {} dist/ \;

      - name: 上传到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: false

      - name: 上传到 Gitee Releases
        continue-on-error: true
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG: ${{ needs.get-version.outputs.tag }}
        run: |
          RELEASE_ID=$(curl -s \
            -H "Authorization: bearer $GITEE_TOKEN" \
            "https://gitee.com/api/v5/repos/${{ env.GITEE_REPO }}/releases/tags/$TAG" \
            | jq -r '.id')
          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "⚠️ 未找到 Gitee Release，跳过上传（可手动补传）"
            exit 0
          fi
          echo "📤 上传到 Gitee Release id=$RELEASE_ID ..."
          shopt -s nullglob
          UPLOAD_COUNT=0
          FAIL_COUNT=0
          for f in dist/*.dmg dist/*.sig; do
            echo "  上传: $(basename "$f")"
            if curl -sS --max-time 300 -X POST \
              -H "Authorization: bearer $GITEE_TOKEN" \
              -F "file=@$f" \
              "https://gitee.com/api/v5/repos/${{ env.GITEE_REPO }}/releases/$RELEASE_ID/release_files"; then
              UPLOAD_COUNT=$((UPLOAD_COUNT + 1))
            else
              echo "  ❌ 上传失败: $(basename "$f")（可手动补传）"
              FAIL_COUNT=$((FAIL_COUNT + 1))
            fi
          done
          echo "✅ Gitee 上传: 成功 $UPLOAD_COUNT / 失败 $FAIL_COUNT"
          if [ $FAIL_COUNT -gt 0 ]; then
            echo "⚠️ 前往 https://gitee.com/${{ env.GITEE_REPO }}/releases/$TAG 手动补传"
          fi

      - name: 保存签名文件（传递到最终步骤）
        uses: actions/upload-artifact@v4
        with:
          name: sig-macos-x64
          path: dist/*.sig
          if-no-files-found: ignore

  build-macos-aarch64:
    needs: [get-version, create-gitee-release]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 同步版本号至 tauri.conf.json
        run: |
          jq --arg v "${{ needs.get-version.outputs.version }}" \
            '.version = $v' src-tauri/tauri.conf.json > tmp.json \
            && mv tmp.json src-tauri/tauri.conf.json

      - name: 安装 Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: aarch64-apple-darwin
          rustflags: ""

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装前端依赖
        run: npm ci

      - name: 安装 Tauri CLI
        run: npm install -D @tauri-apps/cli

      - name: 构建（macOS Apple Silicon）
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: npx @tauri-apps/cli build --target aarch64-apple-darwin

      - name: 收集产物
        run: |
          mkdir -p dist
          cp -R "src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/"*.dmg dist/ 2>/dev/null || true
          find src-tauri/target/aarch64-apple-darwin/release -name "*.sig" -exec cp {} dist/ \;

      - name: 上传到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: false

      - name: 上传到 Gitee Releases
        continue-on-error: true
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG: ${{ needs.get-version.outputs.tag }}
        run: |
          RELEASE_ID=$(curl -s \
            -H "Authorization: bearer $GITEE_TOKEN" \
            "https://gitee.com/api/v5/repos/${{ env.GITEE_REPO }}/releases/tags/$TAG" \
            | jq -r '.id')
          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "⚠️ 未找到 Gitee Release，跳过上传（可手动补传）"
            exit 0
          fi
          echo "📤 上传到 Gitee Release id=$RELEASE_ID ..."
          shopt -s nullglob
          UPLOAD_COUNT=0
          FAIL_COUNT=0
          for f in dist/*.dmg dist/*.sig; do
            echo "  上传: $(basename "$f")"
            if curl -sS --max-time 300 -X POST \
              -H "Authorization: bearer $GITEE_TOKEN" \
              -F "file=@$f" \
              "https://gitee.com/api/v5/repos/${{ env.GITEE_REPO }}/releases/$RELEASE_ID/release_files"; then
              UPLOAD_COUNT=$((UPLOAD_COUNT + 1))
            else
              echo "  ❌ 上传失败: $(basename "$f")（可手动补传）"
              FAIL_COUNT=$((FAIL_COUNT + 1))
            fi
          done
          echo "✅ Gitee 上传: 成功 $UPLOAD_COUNT / 失败 $FAIL_COUNT"
          if [ $FAIL_COUNT -gt 0 ]; then
            echo "⚠️ 前往 https://gitee.com/${{ env.GITEE_REPO }}/releases/$TAG 手动补传"
          fi

      - name: 保存签名文件
        uses: actions/upload-artifact@v4
        with:
          name: sig-macos-arm64
          path: dist/*.sig
          if-no-files-found: ignore

  build-windows:
    needs: [get-version, create-gitee-release]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 同步版本号至 tauri.conf.json
        shell: pwsh
        run: |
          $v = "${{ needs.get-version.outputs.version }}"
          $cfg = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $cfg.version = $v
          $cfg | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json -Encoding UTF8

      - name: 安装 Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装前端依赖
        run: npm ci

      - name: 安装 Tauri CLI
        run: npm install -D @tauri-apps/cli

      - name: 构建（Windows）
        shell: pwsh
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: npx @tauri-apps/cli build

      - name: 收集产物
        shell: pwsh
        run: |
          mkdir dist -Force
          Copy-Item "src-tauri/target/release/bundle/msi/*.msi" dist/ -ErrorAction SilentlyContinue
          Get-ChildItem src-tauri/target/release/*.sig -ErrorAction SilentlyContinue | Copy-Item -Destination dist/

      - name: 上传到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: false

      - name: 上传到 Gitee Releases
        continue-on-error: true
        shell: pwsh
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG: ${{ needs.get-version.outputs.tag }}
        run: |
          try {
            $resp = curl -s -H "Authorization: bearer $env:GITEE_TOKEN" "https://gitee.com/api/v5/repos/${{ env.GITEE_REPO }}/releases/tags/$env:TAG" | ConvertFrom-Json
            $releaseId = $resp.id
            if (-not $releaseId) {
              Write-Host "⚠️ 未找到 Gitee Release，跳过上传（可手动补传）"
              exit 0
            }
            Write-Host "📤 上传到 Gitee Release id=$releaseId ..."
            $ok = 0; $fail = 0
            Get-ChildItem dist/*.msi, dist/*.sig -ErrorAction SilentlyContinue | ForEach-Object {
              Write-Host "  上传: $($_.Name)"
              curl -sS --max-time 300 -X POST `
                -H "Authorization: bearer $env:GITEE_TOKEN" `
                -F "file=@$($_.FullName)" `
                "https://gitee.com/api/v5/repos/${{ env.GITEE_REPO }}/releases/$releaseId/release_files"
              if ($LASTEXITCODE -eq 0) { $ok++ } else { Write-Host "  ❌ 上传失败: $($_.Name)（可手动补传）"; $fail++ }
            }
            Write-Host "✅ Gitee 上传: 成功 $ok / 失败 $fail"
            if ($fail -gt 0) { Write-Host "⚠️ 前往 https://gitee.com/${{ env.GITEE_REPO }}/releases/$env:TAG 手动补传" }
          } catch {
            Write-Host "⚠️ Gitee 上传异常: $_"
          }

      - name: 保存签名文件
        uses: actions/upload-artifact@v4
        with:
          name: sig-windows
          path: dist/*.sig
          if-no-files-found: ignore

  build-linux:
    needs: [get-version, create-gitee-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 同步版本号至 tauri.conf.json
        run: |
          jq --arg v "${{ needs.get-version.outputs.version }}" \
            '.version = $v' src-tauri/tauri.conf.json > tmp.json \
            && mv tmp.json src-tauri/tauri.conf.json

      - name: 安装 Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            pkg-config
          if ! pkg-config --exists appindicator3-0.1; then
            sudo ln -sf /usr/lib/$(uname -m)-linux-gnu/pkgconfig/ayatana-appindicator3-0.1.pc \
                         /usr/lib/$(uname -m)-linux-gnu/pkgconfig/appindicator3-0.1.pc 2>/dev/null || true
          fi

      - name: 安装前端依赖
        run: npm ci

      - name: 安装 Tauri CLI
        run: npm install -D @tauri-apps/cli

      - name: 构建（Linux）
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: npx @tauri-apps/cli build

      - name: 收集产物
        run: |
          mkdir -p dist
          cp src-tauri/target/release/bundle/appimage/*.AppImage dist/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/deb/*.deb dist/ 2>/dev/null || true
          find src-tauri/target/release -name "*.sig" -exec cp {} dist/ \;

      - name: 上传到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: false

      - name: 上传到 Gitee Releases
        continue-on-error: true
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG: ${{ needs.get-version.outputs.tag }}
        run: |
          RELEASE_ID=$(curl -s \
            -H "Authorization: bearer $GITEE_TOKEN" \
            "https://gitee.com/api/v5/repos/${{ env.GITEE_REPO }}/releases/tags/$TAG" \
            | jq -r '.id')
          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "⚠️ 未找到 Gitee Release，跳过上传（可手动补传）"
            exit 0
          fi
          echo "📤 上传到 Gitee Release id=$RELEASE_ID ..."
          shopt -s nullglob
          UPLOAD_COUNT=0
          FAIL_COUNT=0
          for f in dist/*.AppImage dist/*.deb dist/*.sig; do
            echo "  上传: $(basename "$f")"
            if curl -sS --max-time 300 -X POST \
              -H "Authorization: bearer $GITEE_TOKEN" \
              -F "file=@$f" \
              "https://gitee.com/api/v5/repos/${{ env.GITEE_REPO }}/releases/$RELEASE_ID/release_files"; then
              UPLOAD_COUNT=$((UPLOAD_COUNT + 1))
            else
              echo "  ❌ 上传失败: $(basename "$f")（可手动补传）"
              FAIL_COUNT=$((FAIL_COUNT + 1))
            fi
          done
          echo "✅ Gitee 上传: 成功 $UPLOAD_COUNT / 失败 $FAIL_COUNT"
          if [ $FAIL_COUNT -gt 0 ]; then
            echo "⚠️ 前往 https://gitee.com/${{ env.GITEE_REPO }}/releases/$TAG 手动补传"
          fi

      - name: 保存签名文件
        uses: actions/upload-artifact@v4
        with:
          name: sig-linux
          path: dist/*.sig
          if-no-files-found: ignore

  # ── 步骤 4：更新 updater.json 并推送 ──
  update-updater-json:
    needs:
      - get-version
      - build-macos-x86_64
      - build-macos-aarch64
      - build-windows
      - build-linux
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 下载所有签名文件
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: sig-*
          path: sig-files
          merge-multiple: true

      - name: 读取签名并生成 updater.json
        env:
          TAG: ${{ needs.get-version.outputs.tag }}
          VERSION: ${{ needs.get-version.outputs.version }}
        run: |
          if [ ! -d sig-files ] || [ -z "$(ls -A sig-files 2>/dev/null)" ]; then
            echo "⚠️ 没有签名文件，跳过 updater.json"
            exit 0
          fi
          SIG_X64=$(cat sig-files/*x86_64*.sig sig-files/*x64*.sig 2>/dev/null | head -1 || echo "")
          SIG_ARM64=$(cat sig-files/*aarch64*.sig sig-files/*arm64*.sig 2>/dev/null | head -1 || echo "")
          SIG_WIN=$(cat sig-files/*windows*.sig sig-files/*Win*.sig 2>/dev/null | head -1 || echo "")
          SIG_LINUX=$(cat sig-files/*linux*.sig 2>/dev/null | head -1 || echo "")

          PUB_DATE=$(date -u +'%Y-%m-%dT%H:%M:%S+08:00')
          # 下载 URL 指向 Gitee（国内快）
          BASE_URL="https://gitee.com/${{ env.GITEE_REPO }}/releases/download/$TAG"

          cat > updater.json << JSONEOF
          {
            "version": "$VERSION",
            "notes": "更新详情见 GitHub/Gitee Releases",
            "pub_date": "$PUB_DATE",
            "platforms": {
              "darwin-x86_64": {
                "signature": "${SIG_X64:-}",
                "url": "${BASE_URL}/Files Explorer_${VERSION}_x64.dmg"
              },
              "darwin-aarch64": {
                "signature": "${SIG_ARM64:-}",
                "url": "${BASE_URL}/Files Explorer_${VERSION}_aarch64.dmg"
              },
              "windows-x86_64": {
                "signature": "${SIG_WIN:-}",
                "url": "${BASE_URL}/Files Explorer_${VERSION}_x64_en-US.msi"
              },
              "linux-x86_64": {
                "signature": "${SIG_LINUX:-}",
                "url": "${BASE_URL}/Files Explorer_${VERSION}_amd64.AppImage"
              }
            }
          }
          JSONEOF
          echo "=== 生成的 updater.json ==="
          cat updater.json

      - name: 提交并推送到 Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          if [ ! -f updater.json ]; then
            echo "⚠️ updater.json 未生成，跳过"
            exit 0
          fi
          git config user.name "发布机器人"
          git config user.email "bot@files-explorer.dev"
          git add updater.json
          if git diff --cached --quiet; then
            echo "updater.json 无变化，跳过提交"
          else
            git commit -m "chore: 更新 updater.json 至 ${{ needs.get-version.outputs.version }}"
          fi
          if git push https://oauth2:$GITEE_TOKEN@gitee.com/${{ env.GITEE_REPO }}.git HEAD:master 2>&1; then
            echo "✅ updater.json 已推送到 Gitee"
          else
            echo "❌ Gitee 推送失败"
          fi

      - name: 提交并推送到 GitHub
        run: |
          if [ ! -f updater.json ]; then
            echo "⚠️ updater.json 未生成，跳过"
            exit 0
          fi
          git config user.name "发布机器人"
          git config user.email "bot@files-explorer.dev"
          git add updater.json
          if git diff --cached --quiet; then
            echo "updater.json 无变化，跳过提交"
          else
            git commit -m "chore: 更新 updater.json 至 ${{ needs.get-version.outputs.version }}"
          fi
          git push origin HEAD:master

<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Files Explorer</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                height: 100%;
                overflow: hidden;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
            }
            /* ── Dark theme (default) ── */
            body {
                display: flex;
                align-items: center;
                justify-content: center;
                background: #1e1e2e;
                color: #cdd6f4;
            }
            .splash-card {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 20px;
                padding: 36px 44px;
                background: #181825;
                border: 1px solid #313244;
                border-radius: 16px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
            }
            .splash-logo {
                width: 56px;
                height: 56px;
                border-radius: 12px;
            }
            .splash-title {
                font-size: 18px;
                font-weight: 700;
                letter-spacing: 0.3px;
            }
            .splash-spinner {
                width: 32px;
                height: 32px;
                border: 3px solid #313244;
                border-top-color: #89b4fa;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            .splash-status {
                font-size: 13px;
                color: #6c7086;
            }
            /* ── Light theme ── */
            @media (prefers-color-scheme: light) {
                body {
                    background: #eff1f5;
                    color: #4c4f69;
                }
                .splash-card {
                    background: #e6e9ef;
                    border-color: #ccd0da;
                }
                .splash-spinner {
                    border-color: #ccd0da;
                    border-top-color: #1e66f5;
                }
                .splash-status {
                    color: #9ca0b0;
                }
            }
        </style>
    </head>
    <body>
        <div class="splash-card">
            <img class="splash-logo" src="/icon.png" alt="Files Explorer" />
            <div class="splash-title">Files Explorer</div>
            <div class="splash-spinner"></div>
            <div class="splash-status">Loading...</div>
        </div>
    </body>
</html>
